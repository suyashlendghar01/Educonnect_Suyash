<div class="enrollment-container">
  <h2>Course Enrollment</h2>

  <p class="success-message" *ngIf="successMessage">{{ successMessage }}</p>
  <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="course-card" *ngFor="let course of availableCourses">
    <p><strong>Course Name:</strong> {{ course.courseName }}</p>
    <p><strong>Description:</strong> {{ course.description }}</p>
    <p><strong>Teacher:</strong> {{ course.teacher?.fullName }}</p>
    <p><strong>Specialty:</strong> {{ course.teacher?.specialty || course.teacher?.subject }}</p>

    <button [disabled]="isEnrolled(course.courseId)" (click)="enroll(course)">
      {{ isEnrolled(course.courseId) ? 'Enrolled' : 'Enroll Now' }}
    </button>
  </div>
</div>
