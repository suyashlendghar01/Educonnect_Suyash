<div class="teacher-edit-container">
  <h2>Edit Teacher Profile</h2>

  <form [formGroup]="teacherForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" formControlName="username" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" />
    </div>

    <div class="form-group">
      <label for="fullName">Full Name</label>
      <input id="fullName" formControlName="fullName" />
    </div>

    <div class="form-group">
      <label for="contactNumber">Contact Number</label>
      <input id="contactNumber" formControlName="contactNumber" />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
    </div>

    <div class="form-group">
      <label for="subject">Subject</label>
      <input id="subject" formControlName="subject" />
    </div>

    <div class="form-group">
      <label for="yearsOfExperience">Years of Experience</label>
      <input
        id="yearsOfExperience"
        type="number"
        formControlName="yearsOfExperience"
      />
    </div>

    <div class="button-group">
      <button type="submit">Save</button>
      <button type="button" (click)="resetForm()">Reset</button>
      <button type="button" (click)="goBack()">Back</button>
    </div>
  </form>

  <p class="success-message" *ngIf="successMessage">{{ successMessage }}</p>
  <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
</div>
